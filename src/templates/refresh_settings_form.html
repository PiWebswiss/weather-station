<!-- Refresh Settings Form - Reusable Component -->
<div class="form-group">
    <label>Refresh</label>
    <span title="Determines how often the data and image should be refreshed.">ⓘ</span>
</div>
<div class="form-group nowrap" id="{{ prefix }}-group-interval">
  <input type="radio" name="refreshType" id="{{ prefix }}-refresh-interval" value="interval" checked>
  <label for="{{ prefix }}-refresh-interval">Every</label>
  <input type="number" id="{{ prefix }}-interval" name="interval" class="form-input" required min="1" placeholder="Enter a number">
  <select id="{{ prefix }}-unit" name="unit" class="form-input" required>
    <option value="minute">Minute</option>
    <option value="hour">Hour</option>
    <option value="day">Day</option>
  </select>
</div>

<div class="form-group nowrap" id="{{ prefix }}-group-scheduled">
  <input type="radio" name="refreshType" id="{{ prefix }}-refresh-scheduled" value="scheduled">
  <label for="{{ prefix }}-refresh-scheduled">Daily at</label>
  <input id="{{ prefix }}-scheduled" class="time-input" type="time" name="refreshTime" step="60">
</div>

<div class="form-group">
  <div id="{{ prefix }}-refresh-warning" class="warning-text hidden">
    Warning: This refresh interval may exceed typical free API request limits.
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Interval group
    const groupInterval = document.getElementById('{{ prefix }}-group-interval');
    const radioInterval = document.getElementById('{{ prefix }}-refresh-interval');
    const inputInterval = document.getElementById('{{ prefix }}-interval');

    // Scheduled group
    const groupScheduled = document.getElementById('{{ prefix }}-group-scheduled');
    const radioScheduled = document.getElementById('{{ prefix }}-refresh-scheduled');
    const inputScheduled = document.getElementById('{{ prefix }}-scheduled');
    const selectUnit = document.getElementById('{{ prefix }}-unit');
    const warning = document.getElementById('{{ prefix }}-refresh-warning');
    const providerSelect = document.getElementById('weatherProvider');

    const MINUTES_PER_DAY = 1440;
    const PROVIDER_LIMITS = {
      OpenWeatherMap: { perDay: 1000, label: 'OpenWeatherMap One Call 3.0' },
      OpenMeteo: { perMinute: 600, perHour: 5000, perDay: 10000, label: 'Open-Meteo (free)' },
      MeteoSwiss: { perMinute: 20, label: 'MeteoSwiss (geo.admin.ch fair use)' }
    };

    const getProvider = () => {
      if (providerSelect && providerSelect.value) return providerSelect.value;
      if (typeof pluginSettings !== 'undefined' && pluginSettings.weatherProvider) {
        return pluginSettings.weatherProvider;
      }
      return null;
    };

    const getIntervalMinutes = () => {
      const value = parseFloat(inputInterval.value);
      if (!value || value <= 0) return null;
      const unit = selectUnit ? selectUnit.value : 'minute';
      if (unit === 'hour') return value * 60;
      if (unit === 'day') return value * MINUTES_PER_DAY;
      return value;
    };

    const updateWarning = () => {
      if (!warning) return;
      if (!radioInterval.checked) {
        warning.classList.add('hidden');
        return;
      }

      const minutes = getIntervalMinutes();
      if (!minutes) {
        warning.classList.add('hidden');
        return;
      }

      const provider = getProvider();
      const limits = provider ? PROVIDER_LIMITS[provider] : null;
      if (!limits) {
        warning.classList.add('hidden');
        return;
      }

      const estimatedPerDay = MINUTES_PER_DAY / minutes;
      const estimatedPerHour = 60 / minutes;
      const estimatedPerMinute = 1 / minutes;

      const exceeded = [];
      if (limits.perDay && estimatedPerDay > limits.perDay) {
        exceeded.push(`~${Math.ceil(estimatedPerDay)} requests/day (limit ${limits.perDay}/day)`);
      }
      if (limits.perHour && estimatedPerHour > limits.perHour) {
        exceeded.push(`~${Math.ceil(estimatedPerHour)} requests/hour (limit ${limits.perHour}/hour)`);
      }
      if (limits.perMinute && estimatedPerMinute > limits.perMinute) {
        exceeded.push(`~${Math.ceil(estimatedPerMinute)} requests/min (limit ${limits.perMinute}/min)`);
      }

      if (exceeded.length > 0) {
        warning.textContent = `Warning: This interval may exceed free-tier limits for ${limits.label}: ${exceeded.join(', ')}.`;
        warning.classList.remove('hidden');
      } else {
        warning.classList.add('hidden');
      }
    };

    if (groupInterval && groupScheduled) {
      // Helper to activate a group
      const activateGroup = (radio, input) => {
        radio.checked = true;
        // Focus after a short delay to ensure radio updates visually
        setTimeout(() => input.focus(), 0);
      };

      // Click anywhere inside group → activate
      groupInterval.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        activateGroup(radioInterval, inputInterval);
      });

      groupScheduled.addEventListener('click', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        activateGroup(radioScheduled, inputScheduled);
      });

      // Clicking the radio itself → focus the input
      radioInterval.addEventListener('click', () => activateGroup(radioInterval, inputInterval));
      radioScheduled.addEventListener('click', () => activateGroup(radioScheduled, inputScheduled));

      // Focusing inputs → auto-select their radio
      inputInterval.addEventListener('focus', () => (radioInterval.checked = true));
      inputScheduled.addEventListener('focus', () => (radioScheduled.checked = true));
      if (selectUnit) {
        selectUnit.addEventListener('focus', () => (radioInterval.checked = true));
      }

      inputInterval.addEventListener('input', updateWarning);
      if (selectUnit) {
        selectUnit.addEventListener('change', updateWarning);
      }
      if (providerSelect) {
        providerSelect.addEventListener('change', updateWarning);
      }
      radioInterval.addEventListener('change', updateWarning);
      radioScheduled.addEventListener('change', updateWarning);
      updateWarning();
    }
  });
</script>
