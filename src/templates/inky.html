<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ config.name }} — Dashboard</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static',filename='styles/main.css') }}">
    <script>
        (function() {
            const stored = localStorage.getItem('inkypi-theme');
            if (stored === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();

        let lastModified = null;
        const refreshIntervalMs = 1000; // 1-second polling

        async function refreshImage() {
            const img = document.querySelector('.preview-img');
            if (!img) return;
            try {
                const headers = {};
                if (lastModified) headers['If-Modified-Since'] = lastModified;
                const response = await fetch('{{ url_for("main.get_current_image") }}', { headers });
                if (response.status === 304) return false;
                if (!response.ok) return false;
                const blob = await response.blob();
                img.src = URL.createObjectURL(blob);
                lastModified = response.headers.get('Last-Modified');
                return true;
            } catch (e) { console.error('Image refresh error:', e); return false; }
        }

        document.addEventListener('DOMContentLoaded', function() {
            refreshImage();
            setInterval(refreshImage, refreshIntervalMs);
        });
    </script>
    <script src="{{ url_for('static', filename='scripts/image_modal.js') }}"></script>
    <style>
        /* ── Countdown / action bar ─────────────────────────────────────── */
        .preview-action-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            background: var(--card-2);
            border-top: 1px solid var(--border);
            border-radius: 0 0 var(--radius) var(--radius);
            flex-wrap: wrap;
        }
        .countdown-label {
            font-size: 13px;
            color: var(--muted);
            flex: 1;
        }
        .countdown-value {
            font-variant-numeric: tabular-nums;
            font-weight: 600;
            color: var(--accent);
        }
        .btn-update-now {
            padding: 7px 18px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            white-space: nowrap;
        }
        .btn-update-now:hover { opacity: 0.88; }
        .btn-update-now:active { transform: scale(0.96); }
        .btn-update-now:disabled { opacity: 0.5; cursor: not-allowed; }
        .update-toast {
            font-size: 12px;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .update-toast.visible { opacity: 1; }
    </style>
</head>
<body class="wp-admin">
    <script src="{{ url_for('static', filename='scripts/dark_mode.js') }}"></script>

    <!-- ── Top admin bar ──────────────────────────────────────────────────── -->
    <div class="adminbar">
        <div class="adminbar-brand">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
            <span>{{ config.name }}</span>
        </div>
        <div class="adminbar-links">
            <a href="{{ url_for('settings.settings_page') }}" class="adminbar-link">Settings</a>
            <a href="{{ url_for('playlist.playlists') }}" class="adminbar-link">Playlists</a>
            <a href="{{ url_for('apikeys.apikeys_page') }}" class="adminbar-link">API Keys</a>
            <button class="adminbar-link dark-mode-toggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode"></button>
        </div>
    </div>

    <!-- ── Main layout: sidebar + content ─────────────────────────────────── -->
    <div class="wp-layout">

        <!-- Sidebar -->
        <aside class="wp-sidebar">
            <nav class="sidebar-nav">
                <div class="sidebar-section-label">Display</div>
                <a href="/" class="sidebar-link active">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                    Dashboard
                </a>
                <a href="{{ url_for('settings.settings_page') }}" class="sidebar-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
                    Device Settings
                </a>

                <div class="sidebar-section-label">Content</div>
                <a href="{{ url_for('playlist.playlists') }}" class="sidebar-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
                    Playlists
                </a>

                <div class="sidebar-section-label">Integrations</div>
                <a href="{{ url_for('apikeys.apikeys_page') }}" class="sidebar-link">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                    API Keys
                </a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="wp-main">

            <!-- Live preview card -->
            <div class="wp-card preview-card">
                <div class="wp-card-header">
                    <div class="wp-card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>
                        Live Preview
                    </div>
                    <div class="preview-status">
                        <span class="status-dot"></span>
                        <span id="previewStatus">Loading…</span>
                    </div>
                </div>
                <div class="image-container">
                    <img class="preview-img" src="{{ url_for('static', filename='images/current_image.png') }}" alt="Current display output">
                </div>
                <!-- Action bar: countdown + update button -->
                <div class="preview-action-bar">
                    <span class="countdown-label">
                        Next refresh in: <span class="countdown-value" id="countdownDisplay">—</span>
                    </span>
                    <span class="update-toast" id="updateToast">Updated!</span>
                    <button class="btn-update-now" id="btnUpdateNow" onclick="triggerUpdateNow()">
                        Update Now
                    </button>
                </div>
            </div>

            <!-- Plugins card -->
            <div class="wp-card">
                <div class="wp-card-header">
                    <div class="wp-card-title">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2H2v10l9.29 9.29c.94.94 2.48.94 3.42 0l6.58-6.58c.94-.94.94-2.48 0-3.42L12 2Z"/><path d="M7 7h.01"/></svg>
                        Plugins
                    </div>
                    <div class="plugins-controls">
                        <button class="wp-btn-ghost sort-toggle" id="sortToggle">Reorder</button>
                        <button class="wp-btn-ghost view-toggle" id="viewToggle">List view</button>
                    </div>
                </div>

                <div class="sort-hint" id="sortHint">Drag plugins to reorder, then click Save.</div>

                <div class="plugins-container" id="pluginsContainer">
                    {% for plugin in plugins %}
                    <a href="{{ url_for('plugin.plugin_page', plugin_id=plugin.id) }}"
                       class="plugin-item"
                       data-plugin-id="{{ plugin.id }}"
                       title="{{ plugin.display_name }}"
                       draggable="false">
                        <div class="plugin-icon-wrap">
                            <img src="{{ url_for('plugin.image', plugin_id=plugin.id, filename='icon.png') }}"
                                 alt="{{ plugin.display_name }}"
                                 class="plugin-icon-img">
                        </div>
                        <span class="plugin-name">{{ plugin.display_name }}</span>
                        <svg class="plugin-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                    </a>
                    {% endfor %}
                </div>
            </div>

        </main>
    </div>

    <script>
        // ── Live preview status ────────────────────────────────────────────
        const statusEl = document.getElementById('previewStatus');
        async function trackedRefresh() {
            const img = document.querySelector('.preview-img');
            const before = img ? img.src : null;
            const changed = await refreshImage();
            const after = img ? img.src : null;
            if (changed && after && after !== before) {
                statusEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            trackedRefresh();
            setInterval(trackedRefresh, refreshIntervalMs);
        });

        // ── Countdown timer ────────────────────────────────────────────────
        let countdownSeconds = null;
        const countdownEl = document.getElementById('countdownDisplay');

        function formatCountdown(sec) {
            if (sec === null || sec === undefined) return '—';
            if (sec <= 0) return 'now';
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
            return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        async function fetchStatus() {
            try {
                const r = await fetch('{{ url_for("main.get_status") }}');
                if (!r.ok) return;
                const data = await r.json();
                if (data.seconds_until_refresh !== null && data.seconds_until_refresh !== undefined) {
                    countdownSeconds = data.seconds_until_refresh;
                }
            } catch(e) {}
        }

        // Tick countdown every second, re-sync from server every 30s
        setInterval(() => {
            if (countdownSeconds !== null) {
                countdownSeconds = Math.max(0, countdownSeconds - 1);
                countdownEl.textContent = formatCountdown(countdownSeconds);
            }
        }, 1000);

        setInterval(fetchStatus, 30000);

        document.addEventListener('DOMContentLoaded', () => {
            fetchStatus().then(() => {
                countdownEl.textContent = formatCountdown(countdownSeconds);
            });
        });

        // ── Update Now button ──────────────────────────────────────────────
        const btnUpdate = document.getElementById('btnUpdateNow');
        const toastEl = document.getElementById('updateToast');

        async function triggerUpdateNow() {
            btnUpdate.disabled = true;
            btnUpdate.textContent = 'Updating…';
            try {
                const r = await fetch('{{ url_for("main.refresh_now") }}', { method: 'POST' });
                const data = await r.json();
                if (r.ok) {
                    statusEl.textContent = 'Updated ' + new Date().toLocaleTimeString();
                    toastEl.classList.add('visible');
                    setTimeout(() => toastEl.classList.remove('visible'), 2500);
                    // Re-fetch image immediately
                    lastModified = null;
                    await refreshImage();
                    // Reset countdown
                    await fetchStatus();
                    countdownEl.textContent = formatCountdown(countdownSeconds);
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch(e) {
                alert('Update failed: ' + e.message);
            } finally {
                btnUpdate.disabled = false;
                btnUpdate.textContent = 'Update Now';
            }
        }

        // ── View toggle (grid / list) ──────────────────────────────────────
        const viewToggle = document.getElementById('viewToggle');
        const pluginsContainer = document.getElementById('pluginsContainer');
        let currentView = localStorage.getItem('inkypi-plugins-view') || 'grid';

        function updateView() {
            if (currentView === 'list') {
                pluginsContainer.classList.add('list-view');
                viewToggle.textContent = 'Grid view';
            } else {
                pluginsContainer.classList.remove('list-view');
                viewToggle.textContent = 'List view';
            }
        }
        viewToggle.addEventListener('click', () => {
            currentView = currentView === 'grid' ? 'list' : 'grid';
            localStorage.setItem('inkypi-plugins-view', currentView);
            updateView();
        });
        updateView();

        // ── Sort / drag-and-drop ───────────────────────────────────────────
        const sortToggle = document.getElementById('sortToggle');
        const sortHint = document.getElementById('sortHint');
        let isSorting = false, draggedItem = null;

        function enableSorting() {
            isSorting = true;
            sortToggle.classList.add('active');
            sortToggle.textContent = 'Save order';
            sortHint.classList.add('visible');
            pluginsContainer.classList.add('sorting');
            document.querySelectorAll('.plugin-item').forEach(item => {
                item.draggable = true;
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragend', handleDragEnd);
                item.addEventListener('dragover', handleDragOver);
                item.addEventListener('dragleave', handleDragLeave);
                item.addEventListener('drop', handleDrop);
                item.addEventListener('click', preventClick);
            });
        }

        function disableSorting() {
            isSorting = false;
            sortToggle.classList.remove('active');
            sortToggle.textContent = 'Reorder';
            sortHint.classList.remove('visible');
            pluginsContainer.classList.remove('sorting');
            document.querySelectorAll('.plugin-item').forEach(item => {
                item.draggable = false;
                item.removeEventListener('dragstart', handleDragStart);
                item.removeEventListener('dragend', handleDragEnd);
                item.removeEventListener('dragover', handleDragOver);
                item.removeEventListener('dragleave', handleDragLeave);
                item.removeEventListener('drop', handleDrop);
                item.removeEventListener('click', preventClick);
            });
            savePluginOrder();
        }

        function preventClick(e) { if (isSorting) e.preventDefault(); }
        function handleDragStart(e) { draggedItem = this; this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
        function handleDragEnd() { this.classList.remove('dragging'); document.querySelectorAll('.plugin-item').forEach(i => i.classList.remove('drag-over')); }
        function handleDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; if (this !== draggedItem) this.classList.add('drag-over'); }
        function handleDragLeave() { this.classList.remove('drag-over'); }
        function handleDrop(e) {
            e.preventDefault();
            this.classList.remove('drag-over');
            if (this !== draggedItem) {
                const items = Array.from(pluginsContainer.children);
                if (items.indexOf(draggedItem) < items.indexOf(this)) this.parentNode.insertBefore(draggedItem, this.nextSibling);
                else this.parentNode.insertBefore(draggedItem, this);
            }
        }

        async function savePluginOrder() {
            const order = Array.from(pluginsContainer.children).map(i => i.dataset.pluginId);
            try {
                const r = await fetch('{{ url_for("main.save_plugin_order") }}', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order })
                });
                if (!r.ok) console.error('Failed to save plugin order');
            } catch(e) { console.error(e); }
        }

        sortToggle.addEventListener('click', () => isSorting ? disableSorting() : enableSorting());
    </script>
</body>
</html>
