<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}InkyPi{% endblock %} — {{ config.name if config else 'InkyPi' }}</title>
    <script>
        (function() {
            const stored = localStorage.getItem('inkypi-theme');
            if (stored === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/main.css') }}">
    <!-- Bootstrap 5 for utility classes -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          crossorigin="anonymous">
    <style>
        /* Blend Bootstrap into the InkyPi theme */
        body { font-family: "Jost", "Segoe UI", sans-serif; }
        .card { background: var(--card); border-color: var(--border); }
        .form-select, .form-control {
            background: var(--card-2);
            border-color: var(--border);
            color: var(--ink);
        }
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-primary:hover { opacity: 0.88; background: var(--accent); }
        .text-muted { color: var(--muted) !important; }
    </style>
</head>
<body class="wp-admin">
    <script src="{{ url_for('static', filename='scripts/dark_mode.js') }}"></script>
    <script src="{{ url_for('static', filename='scripts/response_modal.js') }}"></script>

    <!-- ── Top admin bar ── -->
    <div class="adminbar">
        <div class="adminbar-brand">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
            </svg>
            <span>{{ config.name if config else 'InkyPi' }}</span>
        </div>
        <div class="adminbar-links">
            <a href="/" class="adminbar-link">Dashboard</a>
            <a href="{{ url_for('settings.settings_page') }}" class="adminbar-link">Settings</a>
            <a href="{{ url_for('playlist.playlists') }}" class="adminbar-link">Playlists</a>
            <a href="{{ url_for('apikeys.apikeys_page') }}" class="adminbar-link">API Keys</a>
            <button class="adminbar-link dark-mode-toggle" title="Toggle Dark Mode" aria-label="Toggle Dark Mode"></button>
        </div>
    </div>

    <div style="padding: 24px;">
        <button onclick="history.back()" class="back-button" style="margin-bottom:16px;">← Back</button>
        {% block content %}{% endblock %}
    </div>

    {% include 'response_modal.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            crossorigin="anonymous"></script>
</body>
</html>
